<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Typing Effect</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "JetBrains Mono", monospace;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #020617, #000);
  overflow: hidden;
  color: #00ffcc;
}

/* ===== GLOW BACKGROUND ===== */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: #00ffcc;
  filter: blur(120px);
  opacity: 0.15;
}

/* ===== TERMINAL CARD ===== */
.terminal {
  position: relative;
  padding: 30px 40px;
  border-radius: 14px;
  background: rgba(0, 0, 0, 0.7);
  border: 1px solid rgba(0, 255, 204, 0.4);
  box-shadow:
    0 0 30px rgba(0, 255, 204, 0.25),
    inset 0 0 25px rgba(0, 255, 204, 0.08);
  max-width: 720px;
  width: 90%;
}

/* ===== TERMINAL HEADER ===== */
.terminal-header {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.dot.red { background: #ff5f56; }
.dot.yellow { background: #ffbd2e; }
.dot.green { background: #27c93f; }

/* ===== TEXT AREA ===== */
.text {
  font-size: 20px;
  line-height: 1.6;
  letter-spacing: 0.5px;
  text-shadow:
    0 0 5px rgba(0,255,204,0.8),
    0 0 15px rgba(0,255,204,0.4);
  white-space: pre-wrap;
}

/* ===== CURSOR ===== */
.cursor {
  display: inline-block;
  width: 10px;
  background: #00ffcc;
  margin-left: 3px;
  animation: blink 0.9s infinite;
  box-shadow: 0 0 10px #00ffcc;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ===== MATRIX NOISE ===== */
.noise {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 2px
  );
  mix-blend-mode: overlay;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="terminal">
  <div class="terminal-header">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
  </div>

  <div class="text" id="text"></div><span class="cursor"></span>
  <div class="noise"></div>
</div>

<script>
const targetText = 
`> Initializing system...
> Access granted.
> Loading modules...
Welcome, User.
You are now inside the system.
[ STATUS ]: ACTIVE
[ SECURITY ]: ENABLED
[ MODE ]: STEALTH`;

const chars = "!@#$%^&*()_+-=<>?/[]{}ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const speed = 35;

const el = document.getElementById("text");


let index = 0;

function type() {
  if (index < targetText.length) {
    if (targetText[index] === "\n") {
      el.innerHTML += "<br>";
    } else {
      let randomChar = chars[Math.floor(Math.random() * chars.length)];
      el.innerHTML += `<span>${randomChar}</span>`;
      setTimeout(() => {
        el.lastChild.textContent = targetText[index];
      }, speed);
    }
    index++;
    setTimeout(type, speed);
  }
}

type();
</script>

</body>
</html>
