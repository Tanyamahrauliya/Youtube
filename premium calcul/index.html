<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Premium Calculator</title>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.15);
  --accent: #38bdf8;
  --text: #e5e7eb;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1e293b, var(--bg));
  display: grid;
  place-items: center;
  color: var(--text);
}

/* Calculator Card */
.calculator {
  width: 320px;
  padding: 1.2rem;
  border-radius: 18px;
  background: var(--card);
  backdrop-filter: blur(16px);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.5),
    inset 0 0 0 1px rgba(255,255,255,0.05);
}

/* Display */
.display {
  background: var(--glass);
  border-radius: 14px;
  padding: 1rem;
  margin-bottom: 1rem;
  text-align: right;
  font-size: 2rem;
  min-height: 64px;
  overflow-x: auto;
}

/* Buttons Grid */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.6rem;
}

button {
  height: 56px;
  border-radius: 14px;
  border: none;
  font-size: 1.1rem;
  font-weight: 500;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: var(--text);
  transition: transform 0.1s ease, background 0.2s ease;
}

button:hover {
  background: rgba(255,255,255,0.18);
}

button:active {
  transform: scale(0.95);
}

.operator {
  color: var(--accent);
}

.equal {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: #000;
  font-weight: 600;
}

.equal:hover {
  background: linear-gradient(135deg, #7dd3fc, #38bdf8);
}

.span-2 {
  grid-column: span 2;
}
</style>
</head>

<body>

<div class="calculator">
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button onclick="clearAll()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button class="operator" onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button class="span-2" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
const display = document.getElementById("display");

function append(value) {
  display.textContent =
    display.textContent === "0" ? value : display.textContent + value;
}

function clearAll() {
  display.textContent = "0";
}

function deleteLast() {
  display.textContent =
    display.textContent.length > 1
      ? display.textContent.slice(0, -1)
      : "0";
}

function calculate() {
  try {
    display.textContent = Function("return " + display.textContent)();
  } catch {
    display.textContent = "Error";
  }
}

/* Keyboard Support */
document.addEventListener("keydown", e => {
  if ("0123456789+-*/.%".includes(e.key)) append(e.key);
  if (e.key === "Enter") calculate();
  if (e.key === "Backspace") deleteLast();
  if (e.key === "Escape") clearAll();
});
</script>

</body>
</html>
