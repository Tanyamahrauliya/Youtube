<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Pomodoro Timer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#5f72ff,#c084fc);
  overflow:hidden;
}

/* Glass Card */
.card{
  width:380px;
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
  text-align:center;
  color:white;
}

/* Title */
h1{
  font-weight:600;
  margin-bottom:20px;
}

/* Circle */
.circle{
  position:relative;
  width:220px;
  height:220px;
  margin:20px auto;
}

svg{
  transform:rotate(-90deg);
}

circle{
  fill:none;
  stroke-width:12;
  stroke-linecap:round;
}

.bg{
  stroke:rgba(255,255,255,0.2);
}

.progress{
  stroke:white;
  stroke-dasharray:628;
  stroke-dashoffset:628;
  transition:stroke-dashoffset 1s linear;
}

.time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  font-weight:bold;
}

/* Controls */
.controls{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:8px 16px;
  border:none;
  border-radius:8px;
  background:white;
  color:#5f72ff;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}

button:hover{
  transform:translateY(-3px);
  background:#f3f3ff;
}

.mode-btn{
  background:rgba(255,255,255,0.2);
  color:white;
}

.mode-btn.active{
  background:white;
  color:#5f72ff;
}

input{
  width:60px;
  padding:5px;
  border-radius:6px;
  border:none;
  text-align:center;
}

.sessions{
  margin-top:15px;
  font-size:14px;
  opacity:0.9;
}

</style>
</head>
<body>

<div class="card">
  <h1>Pomodoro Timer</h1>

  <div class="circle">
    <svg width="220" height="220">
      <circle class="bg" cx="110" cy="110" r="100"></circle>
      <circle class="progress" cx="110" cy="110" r="100"></circle>
    </svg>
    <div class="time" id="time">25:00</div>
  </div>

  <div class="controls">
    <button class="mode-btn active" onclick="setMode(25)">Focus</button>
    <button class="mode-btn" onclick="setMode(5)">Short Break</button>
    <button class="mode-btn" onclick="setMode(15)">Long Break</button>
  </div>

  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

  <div class="controls">
    <input type="number" id="customTime" min="1" placeholder="Min">
    <button onclick="setCustom()">Set</button>
  </div>

  <div class="sessions">
    Completed Sessions: <span id="sessions">0</span>
  </div>
</div>

<script>

let duration = 25 * 60;
let timeLeft = duration;
let interval = null;
let sessions = 0;

const timeDisplay = document.getElementById("time");
const progressCircle = document.querySelector(".progress");
const sessionsDisplay = document.getElementById("sessions");

const circumference = 2 * Math.PI * 100;

function updateDisplay(){
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  timeDisplay.textContent =
    `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

  const progress = circumference * (timeLeft / duration);
  progressCircle.style.strokeDashoffset = circumference - progress;
}

function startTimer(){
  if(interval) return;

  interval = setInterval(()=>{
    if(timeLeft > 0){
      timeLeft--;
      updateDisplay();
    } else {
      clearInterval(interval);
      interval = null;
      sessions++;
      sessionsDisplay.textContent = sessions;
      playSound();
      alert("Time's up! Take a break 🚀");
    }
  },1000);
}

function pauseTimer(){
  clearInterval(interval);
  interval = null;
}

function resetTimer(){
  clearInterval(interval);
  interval = null;
  timeLeft = duration;
  updateDisplay();
}

function setMode(mins){
  duration = mins * 60;
  timeLeft = duration;
  updateDisplay();
  document.querySelectorAll(".mode-btn").forEach(btn=>{
    btn.classList.remove("active");
  });
  event.target.classList.add("active");
}

function setCustom(){
  const val = document.getElementById("customTime").value;
  if(val && val > 0){
    duration = val * 60;
    timeLeft = duration;
    updateDisplay();
  }
}

function playSound(){
  const audio = 
  new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
  audio.play();
}

updateDisplay();

</script>

</body>
</html>
