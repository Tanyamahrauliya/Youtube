<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

/* Full Screen Center */
body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* Glass Box */
.box {
  width: 350px;
  padding: 40px 30px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 
    0 20px 40px rgba(0,0,0,0.4),
    inset 0 0 15px rgba(255,255,255,0.1);
  text-align: center;
  transition: 0.4s ease;
}

.box:hover {
  transform: translateY(-5px);
  box-shadow: 
    0 30px 60px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.15);
}

/* Date Input */
.box input {
  width: 100%;
  padding: 12px 15px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 15px;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  backdrop-filter: blur(5px);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
  transition: 0.3s ease;
}

.box input:focus {
  background: rgba(255,255,255,0.25);
  box-shadow: 0 0 15px #00f2ff;
}

/* Button */
.box button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(135deg, #00f2ff, #0072ff);
  transition: 0.3s ease;
  box-shadow: 0 10px 25px rgba(0,114,255,0.5);
}

.box button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(0,114,255,0.7);
  letter-spacing: 1px;
}

/* Result Text */
#result {
  margin-top: 20px;
  font-size: 16px;
  font-weight: 500;
  color: #ffffff;
  min-height: 24px;
  transition: 0.3s ease;
}

    </style>
</head>
<body>
    
    <div class="box">
        <input type="date" id="dob">
<button onclick="checkAge()">Check Age</button>
<p id="result"></p>
</div>

</body>
<script>
    function checkAge() {
  let dob = new Date(document.getElementById("dob").value);
  let today = new Date();

  let age = today.getFullYear() - dob.getFullYear();

  if (age >= 18) {
    document.getElementById("result").innerText = "You are 18+ ✅";
  } else {
    document.getElementById("result").innerText = "You are under 18 ❌";
  }
};
</script>
</html>
