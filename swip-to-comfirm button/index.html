<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swipe to Confirm Button</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *{box-sizing:border-box;font-family:Poppins,system-ui}
  body{
    height:100vh;
    display:grid;
    place-items:center;
    background:#0f0f14;
  }

  .swipe-container{
    width:320px;
    height:58px;
    background:#1c1c25;
    border-radius:40px;
    position:relative;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.6);
    user-select:none;
  }

  .swipe-text{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    color:#aaa;
    font-weight:600;
    letter-spacing:.5px;
    pointer-events:none;
    transition:.3s;
  }

  .handle{
    position:absolute;
    top:4px;
    left:4px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:linear-gradient(135deg,#00ffd5,#00b3ff);
    box-shadow:0 0 20px rgba(0,255,213,.8);
    cursor:grab;
    transition:.2s;
  }

  .confirmed{
    background:#0e2a1f;
  }

  .confirmed .swipe-text{
    color:#00ffd5;
  }
</style>
</head>

<body>

<div class="swipe-container" id="box">
  <span class="swipe-text" id="text">Swipe to Confirm →</span>
  <div class="handle" id="handle"></div>
</div>

<script>


const box = document.getElementById("box");
  const handle = document.getElementById("handle");
  const text = document.getElementById("text");

  let isDragging = false;
  let startX = 0;

  handle.addEventListener("mousedown", e => {
    isDragging = true;
    startX = e.clientX;
    handle.style.cursor="grabbing";
  });

  document.addEventListener("mousemove", e => {
    if(!isDragging) return;

    const max = box.offsetWidth - handle.offsetWidth - 8;
    let move = e.clientX - startX;
    move = Math.max(0, Math.min(move, max));

    handle.style.left = 4 + move + "px";

    if(move >= max){
      box.classList.add("confirmed");
      text.textContent = "✔ Confirmed";
      isDragging = false;
    }
  });

  document.addEventListener("mouseup", () => {
    handle.style.cursor="grab";
    if(!box.classList.contains("confirmed")){
      handle.style.left = "4px";
    }
    isDragging = false;
  });

</script>

</body>
</html>
