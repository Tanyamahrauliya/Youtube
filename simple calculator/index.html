<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Calculator</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --btn: #1f2933;
            --accent: #38bdf8;
            --text: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: var(--text);
        }

        /* Calculator Card */
        .calculator {
            width: 320px;
            background: linear-gradient(145deg, #0b1220, #020617);
            border-radius: 20px;
            padding: 20px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Display */
        .display {
            background: #020617;
            border-radius: 14px;
            padding: 16px;
            text-align: right;
            font-size: 2rem;
            margin-bottom: 16px;
            overflow-x: auto;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 14px;
            background: var(--btn);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.5);
        }

        button:hover {
            background: #273244;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Special Buttons */
        .operator {
            background: linear-gradient(145deg, #0284c7, #0369a1);
        }

        .operator:hover {
            background: #0284c7;
        }

        .equal {
            grid-column: span 2;
            background: linear-gradient(145deg, #22c55e, #16a34a);
        }

        .equal:hover {
            background: #22c55e;
        }

        .clear {
            background: linear-gradient(145deg, #ef4444, #b91c1c);
        }

        .clear:hover {
            background: #ef4444;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <div class="display" id="display">0</div>

        <div class="buttons">
            <button class="clear">AC</button>
            <button>DEL</button>
            <button>%</button>
            <button class="operator">÷</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">×</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">−</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");
        const buttons = document.querySelectorAll("button");

        let expression = "";

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                const value = btn.textContent;

                if (value === "AC") {
                    expression = "";
                    display.textContent
                        = "0";
                    return;
                }
                if (value === "DEL") {
                    expression = expression.slice(0, -1);
                    display.textContent = expression || "0";
                    return;
                }

                if (value === "=") {
                    try {
                        expression = expression
                            .replace("x", "*")
                            .replace("÷", "/")
                            .replace("−", "-");
                            
                            expression = eval(expression).toString();
                            display.textContent = expression;
                    }
                    catch{
                        display.textContent = "Error";
                        expression = "";
                    }
                    return;
                }

                expression += value;
                display.textContent = expression;
            });
        })
    </script>

</body>

</html>
