<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazy Blur Reveal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  background:#0f172a;
  color:#fff;
  padding:60px 20px;
}

h1{
  text-align:center;
  margin-bottom:60px;
  font-size:34px;
  background:linear-gradient(90deg,#38bdf8,#22c55e,#f43f5e);
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

.gallery{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:35px;
}

.card{
  overflow:hidden;
  border-radius:20px;
  background:#1e293b;
  box-shadow:0 25px 70px rgba(0,0,0,.6);
}

.card img{
  width:100%;
  height:350px;
  object-fit:cover;
  filter:blur(25px);
  transform:scale(1.15);
  opacity:0;
  transition:
    filter .8s ease,
    transform .8s ease,
    opacity .8s ease;
}

/* When visible */
.card img.show{
  filter:blur(0);
  transform:scale(1);
  opacity:1;
}
</style>
</head>
<body>

<h1>Lazy Loading Blur Reveal</h1>

<div class="gallery">
  <div class="card"><img data-src="https://picsum.photos/id/1015/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1016/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1018/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1020/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1024/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1035/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1040/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1050/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1055/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1060/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1070/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1080/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1082/800/600" alt=""></div>
  <div class="card"><img data-src="https://picsum.photos/id/1084/800/600" alt=""></div>

</div>

<script>

/* Professional Lazy Loading */

const images = document.querySelectorAll("img[data-src]");

const observer = new IntersectionObserver((entries, observer)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const img = entry.target;

      // Load real image
      img.src = img.dataset.src;

      img.onload = () => {
        img.classList.add("show");
      };

      observer.unobserve(img);
    }
  });
},{
  threshold:0.25,
  rootMargin:"0px 0px 100px 0px"
});

images.forEach(img=>observer.observe(img));

</script>

</body>
</html>
