<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Zoom on Scroll</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, BlinkMacSystemFont;
}

body{
  background:#0f172a;
  color:#fff;
}

/* Spacer sections */
.section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(1.5rem,3vw,3rem);
  letter-spacing:1px;
}

/* ===== ZOOM SECTION ===== */
.zoom-section{
  position:relative;
  height:120vh;
  overflow:hidden;
}

/* Dark overlay for premium feel */
.zoom-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.6)
  );
  z-index:2;
}

/* Image wrapper */
.zoom-image{
  position:absolute;
  inset:0;
  overflow:hidden;
  transform-origin:center center;
}

/* Image */
.zoom-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1);
  will-change:transform;
  transition:transform 0.1s linear;
}

/* Text */
.zoom-text{
  position:relative;
  z-index:3;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:2rem;
}

.zoom-text h1{
  font-size:clamp(2rem,5vw,4.5rem);
  font-weight:700;
  letter-spacing:1px;
}

.zoom-text p{
  margin-top:1rem;
  max-width:600px;
  font-size:clamp(1rem,2vw,1.2rem);
  opacity:0.85;
}
</style>
</head>

<body>

<div class="section">Scroll Down</div>

<section class="zoom-section" id="zoomSection">
  <div class="zoom-image">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Nature">
  </div>
  <div class="zoom-overlay"></div>

  <div class="zoom-text">
    <h1>Feel the Depth</h1>
    <p>Image smoothly zooms as you scroll — clean, cinematic and modern.</p>
  </div>
</section>

<div class="section">Scroll More</div>

<script>
const section = document.getElementById("zoomSection");
const image = section.querySelector("img");
let latestScroll = 0;
let currentScale = 1;
function animate(){
  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;
  const progress = 1 - (rect.bottom / (windowHeight + rect.height));
  const targetScale = 1 + Math.min(Math.max(progress, 0), 1) * 0.35;
  currentScale += (targetScale - currentScale) * 1.8;
  image.style.transform = `scale(${currentScale})`;
  
  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
