<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Snap – Side Slide Image Animation</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:#0b0c10;
      color:#fff;
      overflow-y:scroll;
      scroll-snap-type:y mandatory;
    }

    section{
      height:100vh;
      scroll-snap-align:start;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    .frame{
      width:75%;
      max-width:1000px;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 40px 120px rgba(0,0,0,.8);
      transform:translateX(-120px) scale(.9);
      opacity:0;
      transition:transform 1s cubic-bezier(.22,1,.36,1), opacity 1s ease;
    }

    section:nth-child(even) .frame{
      transform:translateX(120px) scale(.9);
    }

    section.active .frame{
      transform:translateX(0) scale(1);
      opacity:1;
    }

    img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .label{
      position:absolute;
      bottom:8%;
      left:50%;
      transform:translateX(-50%);
      font-size:30px;
      letter-spacing:1px;
      background:linear-gradient(90deg,#ff7a18,#ffb347);
      background-clip:text;
      -webkit-text-fill-color:transparent;
      opacity:.9;
    }

    section::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, rgba(255,255,255,.05), rgba(0,0,0,.7));
      pointer-events:none;
    }
  </style>
</head>
<body>

  <section>
    <div class="frame">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80" />
    </div>
    <div class="label">Mountain Escape</div>
  </section>

  <section>
    <div class="frame">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80" />
    </div>
    <div class="label">Calm Nature</div>
  </section>

  <section>
    <div class="frame">
      <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1600&q=80" />
    </div>
    <div class="label">Silent Lake</div>
  </section>


  <script>
    const sections = document.querySelectorAll('section');

    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        entry.target.classList.toggle('active',
         entry.isIntersecting);
      });
    },{ threshold:0.55 });

    sections.forEach(sec=>observer.observe(sec));
  </script>

</body>
</html>
