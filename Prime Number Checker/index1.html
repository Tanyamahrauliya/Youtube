<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Number Checker</title>
    <style>
      body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Poppins, sans-serif;
}

.box{
  padding:30px;
  border-radius:10px;
  text-align:center;
  color: #ca6e05;
  box-shadow: 0 0 20px 10px #0202025b;
}

input{
  padding:10px;
  font-size:16px;
  margin:10px 0;
  width:200px;
}

button{
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
}

#result{
  margin-top:15px;
  font-size:18px;
}

    </style>
</head>
<body>
<div class="box">
  <h2>Prime Number Checker</h2>
  <input type="number" id="num" placeholder="Enter a number">
  <button onclick="checkPrime()">Check</button>
  <p id="result"></p>
</div>
</body>
<script>
  function checkPrime() {
  let num = document.getElementById("num").value;
  let result = document.getElementById("result");

  if (num <= 1) {
    result.textContent = "Not a Prime Number ❌";
    return;
  }

  for (let i = 2; i < num; i++) {
    if (num % i === 0) {
      result.textContent = "Not a Prime Number ❌";
      return;
    }
  }

  result.textContent = "Prime Number ✅";
}
</script>
</html>
